<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#111112">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget DAWGs">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Bangers&family=Russo+One&family=Orbitron:wght@400;600;700;900&family=Audiowide&family=Chakra+Petch:wght@400;600;700&family=Press+Start+2P&family=Poppins:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Dancing+Script:wght@400;600;700&family=Great+Vibes&family=Pacifico&family=Sacramento&family=Satisfy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Budget DAWGs</title>
</head>
<body>
  <!-- Anti-flash: runs before first paint — stamps the saved theme's bg so the
       splash background matches the app instead of always showing dark.
       Only 'light' needs special handling; all other themes are dark variants. -->
  <script>!function(){try{var s=JSON.parse(localStorage.getItem('slawminyaw_settings')||'{}');if(s.theme==='light'){var r=document.documentElement.style;r.setProperty('--bg','#f3f3f3');r.setProperty('--text','#181820');r.setProperty('--muted','#606070');document.body.classList.add('light');}}catch(e){}}();</script>

  <!-- Splash screen — visible by default, dismissed by JS after animation -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-inner">
      <div class="splash-dog">
        <img src="./doberman.png" alt="Budget DAWGs" class="splash-dob-img"/>
      </div>
      <div class="splash-texts">
        <div class="splash-brand">Budget DAWGs</div>
        <div class="splash-tagline">Money on a leash.</div>
      </div>
      <div class="splash-bar-wrap">
        <div class="splash-bar"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="brand-lockup">
          <img src="./doberman.png" class="brand-dob" alt="">
          <span class="logo">BUDGET DAWGS</span>
        </div>
        <div class="header-right">
          <select id="account-switcher" class="acct-switcher" title="Switch account"></select>
          <button id="sounds-toggle" class="sounds-btn" title="Toggle sounds">🔔</button>
        </div>
      </div>
    </header>

    <main id="main-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="7" height="8" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="15" width="7" height="6" rx="1.5"/></svg></span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="add">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9"/><line class="detail-line" x1="12" y1="8" x2="12" y2="16"/><line class="detail-line" x1="8" y1="12" x2="16" y2="12"/></svg></span>
        <span class="nav-label">Add</span>
      </button>
      <button class="nav-btn" data-tab="ledger">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline class="detail-line" points="14 2 14 8 20 8"/><line class="detail-line" x1="8" y1="13" x2="16" y2="13"/><line class="detail-line" x1="8" y1="17" x2="13" y2="17"/></svg></span>
        <span class="nav-label">Ledger</span>
      </button>
      <button class="nav-btn" data-tab="weekly">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="17" rx="2"/><line class="detail-line" x1="3" y1="9" x2="21" y2="9"/><line class="detail-line" x1="8" y1="2" x2="8" y2="6"/><line class="detail-line" x1="16" y1="2" x2="16" y2="6"/><rect class="detail-line" x="7" y="13" width="3" height="3" rx=".5"/><rect class="detail-line" x="14" y="13" width="3" height="3" rx=".5"/></svg></span>
        <span class="nav-label">Weekly</span>
      </button>
      <button class="nav-btn" data-tab="bills">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 2h14a1 1 0 0 1 1 1v18l-3-2-2 2-2-2-2 2-2-2-3 2V3a1 1 0 0 1 1-1z"/><line class="detail-line" x1="8" y1="8" x2="16" y2="8"/><line class="detail-line" x1="8" y1="12" x2="16" y2="12"/><line class="detail-line" x1="8" y1="16" x2="12" y2="16"/></svg></span>
        <span class="nav-label">Bills</span>
      </button>
      <button class="nav-btn" data-tab="debt">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="5" width="20" height="14" rx="2"/><line class="detail-line" x1="2" y1="10" x2="22" y2="10"/><rect class="detail-line" x="5" y="14" width="5" height="2.5" rx="1"/></svg></span>
        <span class="nav-label">Debt</span>
      </button>
      <button class="nav-btn" data-tab="goals">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle class="bullseye" cx="12" cy="12" r="2"/><g class="dart"><line x1="21" y1="3" x2="14.2" y2="10.2"/><path class="dart-tip" d="M12,12 L15.2,8.8 L13.2,13.2 Z"/><path d="M21,3 L23,1 M21,3 L22.5,5.5"/></g></svg></span>
        <span class="nav-label">Goals</span>
      </button>
      <button class="nav-btn" data-tab="import">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="17" width="18" height="4" rx="1.5"/><path d="M9 3h6v8h3.5L12 18 5.5 11H9z"/></svg></span>
        <span class="nav-label">Import</span>
      </button>
      <button class="nav-btn" data-tab="budgets">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9"/><line class="detail-line" x1="12" y1="6.5" x2="12" y2="17.5"/><path class="detail-line" d="M15 9.5a3 3 0 0 0-6 0c0 1.66 1.34 2.5 3 3s3 1.34 3 3a3 3 0 0 1-6 0"/></svg></span>
        <span class="nav-label">Budgets</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span class="nav-label">Settings</span>
      </button>
      <button class="nav-btn" data-tab="about">
        <span class="nav-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9"/><line class="detail-line" x1="12" y1="11" x2="12" y2="17"/><circle class="detail-dot" cx="12" cy="7.5" r="1.2"/></svg></span>
        <span class="nav-label">About</span>
      </button>
    </nav>
  </div>

  <div id="anim-overlay" class="anim-overlay hidden">
    <div class="anim-card">
      <div id="anim-title" class="anim-title"></div>
      <canvas id="anim-canvas" width="340" height="155"></canvas>
      <button id="anim-dismiss" class="anim-dismiss"></button>
    </div>
  </div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" class="tut-overlay hidden">
    <div id="tutorial-card" class="tut-card"></div>
  </div>

  <!-- Floating tutorial button -->
  <button id="tut-float-btn" class="tut-float" title="Tutorial">?</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="animations.js"></script>
  <script src="app.js"></script>
</body>
</html>
