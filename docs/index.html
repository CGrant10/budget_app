<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget DAWGs">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Bangers&family=Russo+One&family=Orbitron:wght@400;600;700;900&family=Audiowide&family=Chakra+Petch:wght@400;600;700&family=Press+Start+2P&family=Poppins:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Dancing+Script:wght@400;600;700&family=Great+Vibes&family=Pacifico&family=Sacramento&family=Satisfy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>SlawMinYaw's Budget DAWGs</title>
</head>
<body>
  <!-- Splash screen — visible by default, dismissed by JS after animation -->
  <div id="splash-screen" class="splash-screen">
    <div class="splash-glow"></div>
    <div class="splash-dollars">
      <span class="splash-dollar" style="--dx:-90px;--dy:-75px;animation-delay:.85s">💵</span>
      <span class="splash-dollar" style="--dx: 95px;--dy:-80px;animation-delay:.90s">💰</span>
      <span class="splash-dollar" style="--dx:-110px;--dy: 10px;animation-delay:.95s">💵</span>
      <span class="splash-dollar" style="--dx: 105px;--dy: 15px;animation-delay:1.00s">💰</span>
      <span class="splash-dollar" style="--dx:-70px;--dy: 85px;animation-delay:1.05s">💵</span>
      <span class="splash-dollar" style="--dx: 75px;--dy: 90px;animation-delay:1.10s">💰</span>
    </div>
    <div class="splash-inner">
      <div class="splash-dog">
        <svg class="splash-dob" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
          <!-- left ear -->
          <polygon points="22,52 8,2 38,44" fill="#1c0f0a"/>
          <polygon points="22,51 14,10 36,44" fill="#7a3010" opacity=".65"/>
          <!-- right ear -->
          <polygon points="78,52 92,2 62,44" fill="#1c0f0a"/>
          <polygon points="78,51 86,10 64,44" fill="#7a3010" opacity=".65"/>
          <!-- head -->
          <path d="M20,54 Q14,70 16,86 Q22,108 50,112 Q78,108 84,86 Q86,70 80,54 Q70,42 50,40 Q30,42 20,54Z" fill="#1c0f0a"/>
          <!-- tan above-eye dots -->
          <ellipse cx="36" cy="60" rx="6" ry="5" fill="#7a3010"/>
          <ellipse cx="64" cy="60" rx="6" ry="5" fill="#7a3010"/>
          <!-- tan cheek patches -->
          <ellipse cx="28" cy="83" rx="11" ry="9" fill="#7a3010"/>
          <ellipse cx="72" cy="83" rx="11" ry="9" fill="#7a3010"/>
          <!-- muzzle -->
          <path d="M35,80 Q50,77 65,80 Q67,96 64,108 Q50,112 36,108 Q33,96 35,80Z" fill="#2a1810"/>
          <path d="M38,83 Q50,80 62,83 Q63,95 61,106 Q50,109 39,106 Q37,95 38,83Z" fill="#7a3010"/>
          <!-- nose -->
          <ellipse cx="50" cy="81" rx="10" ry="7" fill="#111"/>
          <ellipse cx="45.5" cy="82.5" rx="2.8" ry="2" fill="#2a2a2a"/>
          <ellipse cx="54.5" cy="82.5" rx="2.8" ry="2" fill="#2a2a2a"/>
          <line x1="50" y1="75" x2="50" y2="80" stroke="#2a2a2a" stroke-width="1.5"/>
          <!-- left eye -->
          <path d="M27,66 Q36,59 45,66 Q36,72 27,66Z" fill="#3d1500"/>
          <ellipse cx="36" cy="66" rx="5" ry="3.5" fill="#200800"/>
          <circle cx="36" cy="66" r="2.2" fill="#0a0a0a"/>
          <circle cx="37.2" cy="64.8" r=".9" fill="rgba(255,255,255,.3)"/>
          <!-- right eye -->
          <path d="M55,66 Q64,59 73,66 Q64,72 55,66Z" fill="#3d1500"/>
          <ellipse cx="64" cy="66" rx="5" ry="3.5" fill="#200800"/>
          <circle cx="64" cy="66" r="2.2" fill="#0a0a0a"/>
          <circle cx="65.2" cy="64.8" r=".9" fill="rgba(255,255,255,.3)"/>
          <!-- angry V brows -->
          <path d="M25,58 L36,63 L50,57 L64,63 L75,58" stroke="#0d0505" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- snarl mouth + fangs -->
          <path d="M42,106 Q50,111 58,106" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M42,106 Q39,100 42,95 Q46,100 44,106Z" fill="#f0ece0"/>
          <path d="M58,106 Q61,100 58,95 Q54,100 56,106Z" fill="#f0ece0"/>
          <rect x="45" y="102" width="4" height="5" rx="1" fill="#f0ece0"/>
          <rect x="51" y="102" width="4" height="5" rx="1" fill="#f0ece0"/>
          <!-- chin tan -->
          <ellipse cx="50" cy="110" rx="7" ry="3.5" fill="#7a3010"/>
        </svg>
      </div>
      <div class="splash-name">SlawMinYaw's</div>
      <div class="splash-brand">Budget DAWGs</div>
      <div class="splash-tagline">Money on a leash.</div>
    </div>
  </div>

  <div id="app">
    <header class="header">
      <div class="header-inner">
        <span class="logo">SlawMinYaw's Budget DAWGs</span>
        <select id="account-switcher" class="acct-switcher" title="Switch account"></select>
        <button id="sounds-toggle" class="sounds-btn" title="Toggle sounds">🔔</button>
      </div>
    </header>

    <main id="main-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="add">
        <span class="nav-icon">➕</span>
        <span class="nav-label">Add</span>
      </button>
      <button class="nav-btn" data-tab="ledger">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Ledger</span>
      </button>
      <button class="nav-btn" data-tab="weekly">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Weekly</span>
      </button>
      <button class="nav-btn" data-tab="bills">
        <span class="nav-icon">📑</span>
        <span class="nav-label">Bills</span>
      </button>
      <button class="nav-btn" data-tab="debt">
        <span class="nav-icon">💳</span>
        <span class="nav-label">Debt</span>
      </button>
      <button class="nav-btn" data-tab="goals">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">Goals</span>
      </button>
      <button class="nav-btn" data-tab="import">
        <span class="nav-icon">📥</span>
        <span class="nav-label">Import</span>
      </button>
      <button class="nav-btn" data-tab="budgets">
        <span class="nav-icon">💰</span>
        <span class="nav-label">Budgets</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
      <button class="nav-btn" data-tab="about">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-label">About</span>
      </button>
    </nav>
  </div>

  <div id="anim-overlay" class="anim-overlay hidden">
    <div class="anim-card">
      <div id="anim-title" class="anim-title"></div>
      <canvas id="anim-canvas" width="340" height="155"></canvas>
      <button id="anim-dismiss" class="anim-dismiss"></button>
    </div>
  </div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" class="tut-overlay hidden">
    <div id="tutorial-card" class="tut-card"></div>
  </div>

  <!-- Floating tutorial button -->
  <button id="tut-float-btn" class="tut-float" title="Tutorial">?</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="animations.js"></script>
  <script src="app.js"></script>
</body>
</html>
