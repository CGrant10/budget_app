<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SlawMinYaw">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Dancing+Script:wght@400;600;700&family=Pacifico&family=Satisfy&family=Great+Vibes&family=Lobster&family=Raleway:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>SlawMinYaw</title>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <span class="logo">SlawMinYaw</span>
        <select id="account-switcher" class="acct-switcher" title="Switch account"></select>
        <button id="sounds-toggle" class="sounds-btn" title="Toggle sounds">🔔</button>
      </div>
    </header>

    <main id="main-content"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-btn" data-tab="add">
        <span class="nav-icon">➕</span>
        <span class="nav-label">Add</span>
      </button>
      <button class="nav-btn" data-tab="ledger">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Ledger</span>
      </button>
      <button class="nav-btn" data-tab="weekly">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Weekly</span>
      </button>
      <button class="nav-btn" data-tab="bills">
        <span class="nav-icon">📑</span>
        <span class="nav-label">Bills</span>
      </button>
      <button class="nav-btn" data-tab="goals">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">Goals</span>
      </button>
      <button class="nav-btn" data-tab="import">
        <span class="nav-icon">📥</span>
        <span class="nav-label">Import</span>
      </button>
      <button class="nav-btn" data-tab="budgets">
        <span class="nav-icon">💰</span>
        <span class="nav-label">Budgets</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
      <button class="nav-btn" data-tab="about">
        <span class="nav-icon">ℹ️</span>
        <span class="nav-label">About</span>
      </button>
    </nav>
  </div>

  <div id="anim-overlay" class="anim-overlay hidden">
    <div class="anim-card">
      <div id="anim-title" class="anim-title"></div>
      <canvas id="anim-canvas" width="340" height="155"></canvas>
      <button id="anim-dismiss" class="anim-dismiss"></button>
    </div>
  </div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" class="tut-overlay hidden">
    <div id="tutorial-card" class="tut-card"></div>
  </div>

  <!-- Floating tutorial button -->
  <button id="tut-float-btn" class="tut-float" title="Tutorial">?</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="animations.js"></script>
  <script src="app.js"></script>
</body>
</html>
