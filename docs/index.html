  <!-- Anti-flash: runs before first paint — stamps the saved theme's bg so the
       splash background matches the app instead of always showing dark.
       Only 'light' needs special handling; all other themes are dark variants. -->
  <script>!function(){try{var s=JSON.parse(localStorage.getItem('slawminyaw_settings')||'{}');var lightThemes=['light','lightsky','lightrose','lightsand'];if(lightThemes.indexOf(s.theme)!==-1){var r=document.documentElement.style;r.setProperty('--bg','#f3f3f3');r.setProperty('--text','#181820');r.setProperty('--muted','#606070');document.body.classList.add('light');}}catch(e){}}();</script>
  <!-- Force-reset: add ?reset to the URL to wipe all SW caches and start fresh -->
  <script>
    if (location.search.indexOf('reset') !== -1) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        }).then(function() {
          return caches.keys();
        }).then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }).then(function() {
          location.replace(location.pathname);
        });
      }
    }
  </script>

    </div>

  <!-- Tutorial overlay -->
  <div id="tutorial-overlay" class="tut-overlay hidden">
    <div id="tutorial-card" class="tut-card"></div>
  </div>

  <!-- Floating tutorial button -->
  <button id="tut-float-btn" class="tut-float" title="Tutorial" aria-label="Open tutorial">?</button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="animations.js"></script>
  <!-- Splash escape: runs before app.js so it works even if app.js has an error -->
  <script>
    (function() {
      var el = document.getElementById('splash-screen');
      if (!el) return;
      var done = false;
      function dismiss() {
        if (done) return;
        done = true;
        el.classList.add('dismiss');
        setTimeout(function() { if (el.parentNode) el.remove(); }, 460);
      }
      // Tap anywhere to skip
      el.addEventListener('click', dismiss);
      // Auto-dismiss at 2s (normal load) — app.js overrides with its own timing
      setTimeout(dismiss, 2000);
      // Nuclear fallback at 6s regardless
      setTimeout(function() { if (!done) { done = true; if (el.parentNode) el.remove(); } }, 6000);
    })();
  </script>
  <script src="app.js"></script>
</body>
</html>
